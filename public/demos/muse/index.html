<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Belleza | Muse</title>
    <link rel="shortcut icon" href="letra-m.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            nude: '#E6DDD6',
                            sand: '#D9C8B8',
                            dark: '#1A1A1A',
                            charcoal: '#333333',
                            light: '#F8F6F4'
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .hero-bg {
            background: linear-gradient(135deg, #FFFEFD 0%, #F4EFEB 100%);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-brand-light text-brand-charcoal font-sans antialiased overflow-x-hidden">

    <header id="navbar" class="fixed w-full top-0 z-50 transition-all duration-300"></header>

    <main>
        <section id="hero" class="relative min-h-screen hero-bg flex items-center justify-center overflow-hidden"></section>
        <section id="services" class="py-20 px-6 lg:px-12"></section>
        <section id="gallery" class="py-20 lg:py-32 px-6 lg:px-12 bg-brand-light"></section>
        <section id="testimonials" class="py-20 lg:py-32 bg-[#FDFCFB] overflow-hidden"></section>
        <section id="team" class="py-20 lg:py-32 px-6 lg:px-12 bg-brand-light"></section>
        <section id="promotions" class="py-20 lg:py-32 px-6 lg:px-12 bg-brand-dark"></section>
        <section id="location" class="py-20 lg:py-32 px-6 lg:px-12 bg-brand-light"></section>
    </main>

    <footer id="footer" class="bg-brand-dark pt-12"></footer>

    <script src="js/data/content.js"></script>
    
    <script src="js/components/navbar.js"></script>
    <script src="js/components/hero.js"></script>
    <script src="js/components/services.js"></script>
    <script src="js/components/gallery.js"></script>
    <script src="js/components/testimonials.js"></script>
    <script src="js/components/team.js"></script>
    <script src="js/components/promotions.js"></script>
    <script src="js/components/location.js"></script>
    <script src="js/components/footer.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
